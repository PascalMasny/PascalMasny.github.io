<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beitrag | Pascal Masny</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/blog.css">
</head>
<body>

<div id="topbar">
  <a class="tb-back" href="blog.html">&larr; <span data-key="back">Blog</span></a>
  <div class="tb-brand"><span class="dim">pascal@blog:</span>~/post<span class="cur">$</span></div>
  <div class="tb-spacer"></div>
  <button class="tb-btn" id="theme-btn">[th]</button>
  <button class="tb-btn" id="lang-btn">EN</button>
</div>

<article class="post-wrap">
  <div class="post-meta" id="post-meta"></div>
  <h1 class="page-head" id="post-title" style="margin-bottom:0;"></h1>
  <div class="tags" id="post-tags" style="margin-top:0.7rem;"></div>
  <img class="post-cover" id="post-cover" src="" alt="" hidden>
  <div class="prose" id="post-body"></div>
  <div class="post-pdf" id="post-pdf"></div>
  <div class="state" id="post-state"></div>
  <footer class="post-contact" id="post-contact" hidden></footer>
</article>

<!-- markdown rendering + sanitising (CDN, no build step) -->
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script>
const STR = {
  de: { back: 'Blog', notFound: '# Beitrag nicht gefunden', loadErr: '# konnte Beitrag nicht laden',
        contactTitle: 'ping pascal.masny',
        contactLead: 'Fragen oder Anmerkungen? So erreichst du mich:' },
  en: { back: 'Blog', notFound: '# post not found',          loadErr: '# failed to load post',
        contactTitle: 'ping pascal.masny',
        contactLead: 'Questions or comments? Here is how to reach me:' }
};

const MAILTO = 'mailto:pascalmasny@pascalmasny.de'
             + '?subject=Kontakt%20%2F%20Contact%20%E2%80%93%20Pascal%20Masny'
             + '&body=Hallo%20Pascal%20%2F%20Hello%20Pascal%2C%0A%0A';

// Contact footer, shown under every post. Rendered from JS so it follows the
// language toggle and stays out of the individual Markdown files.
function renderContact() {
  const el = document.getElementById('post-contact');
  if (!META) { el.hidden = true; return; }
  el.hidden = false;
  el.innerHTML =
    `<h2 class="post-contact-title">${STR[lang].contactTitle}</h2>
     <p class="post-contact-lead">${STR[lang].contactLead}</p>
     <div class="contact-grid">
       <a href="${MAILTO}" class="contact-card">
         <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
         <span>pascalmasny@pascalmasny.de</span>
       </a>
       <a href="https://www.linkedin.com/in/pascalmasny/" target="_blank" rel="noopener" class="contact-card">
         <svg viewBox="0 0 24 24" width="20" height="20"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
         <span>linkedin.com/in/pascalmasny</span>
       </a>
       <a href="https://github.com/PascalMasny" target="_blank" rel="noopener" class="contact-card">
         <svg viewBox="0 0 24 24" width="20" height="20"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
         <span>github.com/PascalMasny</span>
       </a>
     </div>`;
}

let lang  = localStorage.getItem('lang')
            || ((navigator.language || 'de').toLowerCase().startsWith('de') ? 'de' : 'en');
let theme = localStorage.getItem('theme') || 'dark';

const slug = new URLSearchParams(location.search).get('slug');
let META = null;
let pdfRendered = false;

if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
}

// Render a post's PDF (META.pdf) inline as an e-reader: one page + prev/next.
async function renderInlinePdf() {
  const wrap = document.getElementById('post-pdf');
  if (pdfRendered) return;
  if (!META || !META.pdf) { wrap.innerHTML = ''; return; }
  const fallback = `<a class="pdf-fallback" href="${asset(META.pdf)}" target="_blank" rel="noopener">PDF öffnen ↗</a>`;
  if (!window.pdfjsLib) { wrap.innerHTML = fallback; return; }
  pdfRendered = true;
  const fsLabel = lang === 'de' ? 'Vollbild' : 'Fullscreen';
  wrap.innerHTML =
    `<div class="reader">
       <div class="reader-top">
         <div class="reader-spacer"></div>
         <button class="reader-btn" id="reader-fs">&#x26F6; <span id="reader-fs-label">${fsLabel}</span></button>
         <a class="reader-btn" id="reader-dl" href="${asset(META.pdf)}" download>&#x2193; Download</a>
       </div>
       <div class="reader-stage"><canvas id="reader-canvas"></canvas></div>
       <div class="reader-bar">
         <button class="reader-nav" id="reader-prev" aria-label="previous page">&#x2039;</button>
         <span class="reader-count" id="reader-count"></span>
         <button class="reader-nav" id="reader-next" aria-label="next page">&#x203a;</button>
       </div>
     </div>`;
  const reader = wrap.querySelector('.reader');
  const stage  = wrap.querySelector('.reader-stage');
  const canvas = document.getElementById('reader-canvas');
  const count  = document.getElementById('reader-count');
  const prev   = document.getElementById('reader-prev');
  const next   = document.getElementById('reader-next');
  const fsBtn  = document.getElementById('reader-fs');
  let doc, num = 0, cur = 1, task = null;

  const isFs = () => document.fullscreenElement === reader;

  async function draw(n) {
    n = Math.max(1, Math.min(num, n)); cur = n;
    count.textContent = `${n} / ${num}`;
    prev.classList.toggle('disabled', n <= 1);
    next.classList.toggle('disabled', n >= num);
    const page   = await doc.getPage(n);
    const base   = page.getViewport({ scale: 1 });
    const availW = Math.max(120, stage.clientWidth  - 16);
    const availH = Math.max(120, stage.clientHeight - 16);
    // fullscreen fits to width so the page is large and vertically scrollable;
    // inline fits the whole page in view (e-reader).
    const fit    = isFs() ? (availW / base.width)
                          : Math.min(availW / base.width, availH / base.height);
    const dpr    = Math.min(2, window.devicePixelRatio || 1);
    const vp     = page.getViewport({ scale: fit * dpr });
    canvas.width = vp.width; canvas.height = vp.height;
    canvas.style.width  = (vp.width  / dpr) + 'px';
    canvas.style.height = (vp.height / dpr) + 'px';
    if (task) { try { task.cancel(); } catch (_) {} }
    task = page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
    try { await task.promise; } catch (_) { /* superseded */ }
  }

  fsBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) reader.requestFullscreen?.();
    else document.exitFullscreen?.();
  });
  document.addEventListener('fullscreenchange', () => {
    stage.scrollTop = 0;
    draw(cur);
  });

  try {
    doc = await pdfjsLib.getDocument(asset(META.pdf)).promise;
    num = doc.numPages;
    prev.addEventListener('click', () => draw(cur - 1));
    next.addEventListener('click', () => draw(cur + 1));
    let rt;
    window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(() => draw(cur), 150); });
    await draw(1);
  } catch (_) {
    pdfRendered = false;
    wrap.innerHTML = fallback;
  }
}

const asset = p => '../' + p.replace(/^\/+/, '');
function fmtDate(iso) {
  const d = new Date(iso);
  return isNaN(d) ? iso : d.toLocaleDateString(lang === 'de' ? 'de-DE' : 'en-GB',
    { year: 'numeric', month: 'long', day: 'numeric' });
}

function applyTheme(t) {
  theme = t; localStorage.setItem('theme', t);
  document.documentElement.setAttribute('data-theme', t);
}

async function applyLang(l) {
  lang = l; localStorage.setItem('lang', l);
  document.documentElement.lang = l;
  document.querySelectorAll('[data-key]').forEach(el => {
    const v = STR[l][el.dataset.key]; if (v != null) el.textContent = v;
  });
  document.getElementById('lang-btn').textContent = l === 'de' ? 'EN' : 'DE';
  await renderPost();
}

async function renderPost() {
  const state = document.getElementById('post-state');
  const body  = document.getElementById('post-body');
  if (!META) { state.textContent = STR[lang].notFound; return; }

  document.getElementById('post-meta').textContent = fmtDate(META.date);
  document.getElementById('post-title').textContent = META.title[lang] || META.title.de || '';
  document.title = (META.title[lang] || META.title.de || 'Beitrag') + ' | Pascal Masny';

  const cover = document.getElementById('post-cover');
  if (META.cover) { cover.src = asset(META.cover); cover.hidden = false; } else { cover.hidden = true; }

  const tags = document.getElementById('post-tags');
  tags.innerHTML = (META.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

  // try requested language, fall back to the other one
  const tryLangs = [lang, lang === 'de' ? 'en' : 'de'];
  for (const L of tryLangs) {
    try {
      const res = await fetch(`../blog/posts/${slug}.${L}.md`);
      if (res.ok) {
        const md = await res.text();
        body.innerHTML = DOMPurify.sanitize(marked.parse(md));
        state.textContent = '';
        renderInlinePdf();
        renderContact();
        return;
      }
    } catch (_) { /* try next */ }
  }
  body.innerHTML = '';
  state.textContent = STR[lang].loadErr;
}

document.getElementById('theme-btn').addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));
document.getElementById('lang-btn').addEventListener('click', () => applyLang(lang === 'de' ? 'en' : 'de'));

applyTheme(theme);
document.documentElement.lang = lang;
document.getElementById('lang-btn').textContent = lang === 'de' ? 'EN' : 'DE';

fetch('../blog/posts.json')
  .then(r => r.ok ? r.json() : [])
  .then(posts => { META = (posts || []).find(p => p.slug === slug) || null; return renderPost(); })
  .catch(() => { document.getElementById('post-state').textContent = STR[lang].loadErr; });
</script>
</body>
</html>
