<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV | Pascal Masny</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #d4d8df; color: #1e293b; font-size: 11px; line-height: 1.5; }

    /* ── Controls ─────────────────────────────────────────────────────────── */
    .controls {
      position: sticky; top: 0; z-index: 100;
      background: #0f172a; color: #cbd5e1;
      display: flex; align-items: center; gap: 10px; padding: 9px 20px; font-size: 12px;
    }
    .controls a, .controls button {
      font-family: 'Inter', sans-serif; font-size: 11px; cursor: pointer;
      border: 1px solid #334155; border-radius: 4px; padding: 5px 11px;
      background: transparent; color: #94a3b8; text-decoration: none;
      transition: border-color .15s, color .15s;
    }
    .controls a:hover, .controls button:hover { color: #e2e8f0; border-color: #64748b; }
    .btn-print { background: #1d4ed8 !important; color: white !important; border-color: #1d4ed8 !important; }
    .btn-print:hover { background: #1e40af !important; }
    .controls-spacer { flex: 1; }
    .controls-hint { color: #475569; font-size: 10px; }

    /* ── A4 page ──────────────────────────────────────────────────────────── */
    .cv-wrap { padding: 24px 0 40px; }
    .cv-page { width: 210mm; min-height: 297mm; margin: 0 auto; background: #fff; display: flex; box-shadow: 0 8px 32px rgba(0,0,0,.22); }

    /* ── Sidebar ──────────────────────────────────────────────────────────── */
    .cv-sidebar { width: 62mm; flex-shrink: 0; background: #1a3057; color: #e8edf5; display: flex; flex-direction: column; }
    .sidebar-photo { width: 100%; aspect-ratio: 1; overflow: hidden; background: #132644; }
    .sidebar-photo img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
    .sidebar-body { padding: 18px 16px; display: flex; flex-direction: column; gap: 18px; }
    .sidebar-section h4 {
      font-size: 8px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      color: #7a9cc4; margin-bottom: 9px; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .contact-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .contact-list li { display: flex; align-items: flex-start; gap: 7px; font-size: 9px; color: #b8cde4; word-break: break-all; }
    .contact-list li svg { flex-shrink: 0; margin-top: 1px; color: #5b83b8; }
    .skill-list { display: flex; flex-direction: column; gap: 6px; }
    .skill-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .skill-name { font-size: 9px; color: #b8cde4; }
    .dots { display: flex; gap: 3px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; border: 1.5px solid rgba(147,168,196,.5); background: transparent; }
    .dot.on { background: #5b9bd5; border-color: #5b9bd5; }
    .lang-list { display: flex; flex-direction: column; gap: 6px; }
    .lang-row { display: flex; justify-content: space-between; }
    .lang-name { font-size: 9px; color: #b8cde4; }
    .lang-level { font-size: 8.5px; color: #7a9cc4; }
    .cert-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .cert-list li { font-size: 9px; color: #b8cde4; padding-left: 10px; position: relative; }
    .cert-list li::before { content: "▸"; position: absolute; left: 0; color: #5b9bd5; }

    /* ── Main ─────────────────────────────────────────────────────────────── */
    .cv-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .cv-header { padding: 22px 22px 14px; border-bottom: 2px solid #1a3057; }
    .cv-header h1 { font-size: 24px; font-weight: 700; color: #0f1f36; letter-spacing: -.02em; line-height: 1.1; }
    .cv-title { font-size: 11px; font-weight: 600; color: #1d4ed8; margin-top: 4px; }
    .cv-subtitle { font-size: 9.5px; color: #64748b; margin-top: 1px; }
    .cv-body { padding: 14px 22px; flex: 1; display: flex; flex-direction: column; gap: 14px; }

    /* ── Section headings ─────────────────────────────────────────────────── */
    .cv-section > h3 {
      font-size: 8.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      color: #1d4ed8; border-bottom: 1.5px solid #dbeafe; padding-bottom: 4px; margin-bottom: 10px;
    }
    .cv-section p { font-size: 10px; color: #374151; line-height: 1.6; }

    /* ── Awards ──────────────────────────────────────────────────────────── */
    .awards-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .awards-list li { font-size: 9.5px; color: #374151; padding-left: 12px; position: relative; }
    .awards-list li::before { content: "▸"; position: absolute; left: 0; color: #1d4ed8; }

    /* ── Git Graph ────────────────────────────────────────────────────────── */
    .git-filter-bar {
      display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .git-btn {
      font-family: 'Inter', sans-serif; font-size: 8.5px; font-weight: 600;
      border-radius: 3px; padding: 3px 8px; cursor: pointer; border: 1.5px solid;
      transition: all .2s; background: transparent;
    }
    .git-btn[data-filter="all"]    { color: #475569; border-color: #cbd5e1; }
    .git-btn[data-filter="work"]   { color: #1d4ed8; border-color: #93c5fd; }
    .git-btn[data-filter="edu"]    { color: #059669; border-color: #6ee7b7; }
    .git-btn[data-filter="social"] { color: #d97706; border-color: #fcd34d; }
    .git-btn.active[data-filter="all"]    { background: #f1f5f9; color: #1e293b; }
    .git-btn.active[data-filter="work"]   { background: #eff6ff; }
    .git-btn.active[data-filter="edu"]    { background: #ecfdf5; }
    .git-btn.active[data-filter="social"] { background: #fffbeb; }

    .git-timeline {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      transition: grid-template-columns .35s ease;
    }
    .git-timeline.focus-work   { grid-template-columns: 5fr 1fr 1fr; }
    .git-timeline.focus-edu    { grid-template-columns: 1fr 5fr 1fr; }
    .git-timeline.focus-social { grid-template-columns: 1fr 1fr 5fr; }

    .git-branch { min-width: 0; overflow: hidden; transition: opacity .3s; }
    .git-timeline.focus-work   .git-branch[data-branch="edu"],
    .git-timeline.focus-work   .git-branch[data-branch="social"],
    .git-timeline.focus-edu    .git-branch[data-branch="work"],
    .git-timeline.focus-edu    .git-branch[data-branch="social"],
    .git-timeline.focus-social .git-branch[data-branch="work"],
    .git-timeline.focus-social .git-branch[data-branch="edu"] { opacity: .3; }

    .branch-label {
      font-size: 7.5px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase;
      padding: 2px 5px; border-radius: 3px; margin-bottom: 7px; display: block; text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .git-branch[data-branch="work"]   .branch-label { color: #1d4ed8; border: 1.5px solid #bfdbfe; background: #eff6ff; }
    .git-branch[data-branch="edu"]    .branch-label { color: #059669; border: 1.5px solid #a7f3d0; background: #ecfdf5; }
    .git-branch[data-branch="social"] .branch-label { color: #d97706; border: 1.5px solid #fde68a; background: #fffbeb; }

    .branch-track { position: relative; padding-left: 14px; }
    .branch-rail { position: absolute; left: 3px; top: 0; bottom: 0; width: 2px; border-radius: 2px; }
    .git-branch[data-branch="work"]   .branch-rail { background: linear-gradient(#bfdbfe, #93c5fd); }
    .git-branch[data-branch="edu"]    .branch-rail { background: linear-gradient(#a7f3d0, #6ee7b7); }
    .git-branch[data-branch="social"] .branch-rail { background: linear-gradient(#fde68a, #fcd34d); }

    .git-event { position: relative; margin-bottom: 9px; padding: 5px 5px 5px 2px; border-radius: 3px; }
    .git-event::before {
      content: ''; position: absolute; left: -13px; top: 8px;
      width: 9px; height: 9px; border-radius: 50%; border: 2px solid white;
    }
    .git-branch[data-branch="work"]   .git-event::before { background: #1d4ed8; box-shadow: 0 0 0 1px #1d4ed8; }
    .git-branch[data-branch="edu"]    .git-event::before { background: #059669; box-shadow: 0 0 0 1px #059669; }
    .git-branch[data-branch="social"] .git-event::before { background: #d97706; box-shadow: 0 0 0 1px #d97706; }

    .event-date { font-size: 7.5px; color: #94a3b8; margin-bottom: 1px; font-weight: 500; }
    .event-role { font-size: 9px; font-weight: 600; color: #0f1f36; line-height: 1.3; }
    .event-org  { font-size: 8px; color: #4b5563; margin-bottom: 2px; }
    .event-desc { font-size: 8px; color: #6b7280; line-height: 1.4; margin-top: 2px; }
    .event-tags { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 3px; }
    .event-tag  { font-size: 7px; padding: 1px 5px; border-radius: 2px; font-weight: 600; }
    .git-branch[data-branch="work"]   .event-tag { background: #eff6ff; color: #1d4ed8; }
    .git-branch[data-branch="edu"]    .event-tag { background: #ecfdf5; color: #059669; }
    .git-branch[data-branch="social"] .event-tag { background: #fffbeb; color: #d97706; }

    /* ── Print ────────────────────────────────────────────────────────────── */
    @page { size: A4; margin: 0; }
    @media print {
      body { background: none; }
      .controls { display: none !important; }
      .cv-wrap { padding: 0; }
      .cv-page { box-shadow: none; margin: 0; width: 100%; min-height: 100vh; }
      .git-filter-bar { display: none !important; }
      .git-timeline { grid-template-columns: 1fr 1fr 1fr !important; opacity: 1 !important; }
      .git-branch { opacity: 1 !important; }
    }

    /* ── Mobile ─────────────────────────────────────────────────────────── */
    @media (max-width: 820px) {
      .controls {
        flex-wrap: wrap;
        padding: 7px 10px;
        gap: 5px;
      }
      .controls a, .controls button {
        padding: 4px 8px;
        font-size: 10px;
      }
      .controls-hint { display: none; }
      .cv-wrap {
        overflow-x: auto;
        padding: 0;
        -webkit-overflow-scrolling: touch;
      }
      .cv-page {
        margin: 0;
        min-width: 210mm;
      }
    }
  </style>
</head>
<body>

<div class="controls">
  <a id="back-link" href="../index.html">← Portfolio</a>
  <button id="lang-btn" onclick="toggleLang()">English</button>
  <span class="controls-spacer"></span>
  <span class="controls-hint" id="print-hint">Browser-Druckdialog → "Als PDF speichern"</span>
  <button class="btn-print" id="print-btn" onclick="window.print()">Drucken / Als PDF speichern</button>
</div>

<div class="cv-wrap">
<div class="cv-page">

  <!-- Sidebar -->
  <aside class="cv-sidebar">
    <div class="sidebar-photo"><img src="../img/picture.png" alt="Pascal Masny"></div>
    <div class="sidebar-body">
      <div class="sidebar-section">
        <h4 id="h-contact">Kontakt</h4>
        <ul class="contact-list" id="contact-list"></ul>
      </div>
      <div class="sidebar-section">
        <h4 id="h-skills">Skills</h4>
        <div class="skill-list" id="skill-list"></div>
      </div>
      <div class="sidebar-section">
        <h4 id="h-languages">Sprachen</h4>
        <div class="lang-list" id="lang-list"></div>
      </div>
      <div class="sidebar-section">
        <h4 id="h-certs">Zertifikate</h4>
        <ul class="cert-list" id="cert-list"></ul>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="cv-main">
    <div class="cv-header">
      <h1>Pascal Masny</h1>
      <p class="cv-title" id="cv-title">Future Systems Engineer</p>
      <p class="cv-subtitle" id="cv-subtitle"></p>
    </div>

    <div class="cv-body">

      <div class="cv-section">
        <h3 id="h-profile">Profil</h3>
        <p id="cv-profile"></p>
      </div>

      <div class="cv-section">
        <h3 id="h-timeline">Timeline</h3>

        <!-- Filter buttons (hidden in print) -->
        <div class="git-filter-bar" id="git-filter-bar">
          <button class="git-btn active" data-filter="all"    onclick="filterGit('all')">Alle</button>
          <button class="git-btn"        data-filter="work"   onclick="filterGit('work')">Beruf</button>
          <button class="git-btn"        data-filter="edu"    onclick="filterGit('edu')">Ausbildung</button>
          <button class="git-btn"        data-filter="social" onclick="filterGit('social')">Soziales</button>
        </div>

        <!-- Git graph -->
        <div class="git-timeline" id="git-timeline">
          <div class="git-branch" data-branch="work">
            <span class="branch-label" id="label-work">Beruf</span>
            <div class="branch-track">
              <div class="branch-rail"></div>
              <div id="events-work"></div>
            </div>
          </div>
          <div class="git-branch" data-branch="edu">
            <span class="branch-label" id="label-edu">Ausbildung</span>
            <div class="branch-track">
              <div class="branch-rail"></div>
              <div id="events-edu"></div>
            </div>
          </div>
          <div class="git-branch" data-branch="social">
            <span class="branch-label" id="label-social">Soziales</span>
            <div class="branch-track">
              <div class="branch-rail"></div>
              <div id="events-social"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="cv-section">
        <h3 id="h-awards">Auszeichnungen</h3>
        <ul class="awards-list" id="awards-list"></ul>
      </div>

    </div>
  </main>
</div>
</div>

<script src="../js/cv-data.js"></script>
<script>
  let lang = (navigator.language || 'de').startsWith('en') ? 'en' : 'de';

  function dots(pct) {
    const n = Math.round(pct / 20);
    return Array.from({length:5}, (_,i) => `<span class="dot${i<n?' on':''}"></span>`).join('');
  }
  function icon(path) {
    return `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
  }

  function render() {
    const t = CV.T[lang];
    const d = { age: CV.age, yearsCode: CV.yearsCode, yearsWork: CV.yearsWork };

    document.documentElement.lang = lang;

    // controls
    document.getElementById('lang-btn').textContent   = t.langBtn;
    document.getElementById('print-btn').textContent  = t.printBtn;
    document.getElementById('print-hint').textContent = lang === 'de'
      ? 'Browser-Druckdialog → "Als PDF speichern"'
      : 'Browser print dialog → "Save as PDF"';
    document.getElementById('back-link').textContent  = t.backLink;

    // sidebar headings
    document.getElementById('h-contact').textContent   = t.contact;
    document.getElementById('h-skills').textContent    = t.skills;
    document.getElementById('h-languages').textContent = t.languages;
    document.getElementById('h-certs').textContent     = t.certs;

    // main headings
    document.getElementById('cv-title').textContent     = t.cvTitle;
    document.getElementById('cv-subtitle').textContent  = t.subtitle;
    document.getElementById('h-profile').textContent    = t.profile_h;
    document.getElementById('h-timeline').textContent   = t.gitTitle;
    document.getElementById('h-awards').textContent     = t.awards;

    // branch labels
    document.getElementById('label-work').textContent   = t.branchWork;
    document.getElementById('label-edu').textContent    = t.branchEdu;
    document.getElementById('label-social').textContent = t.branchSocial;

    // filter buttons
    document.querySelector('[data-filter="all"]').textContent    = t.filterAll;
    document.querySelector('[data-filter="work"]').textContent   = t.filterWork;
    document.querySelector('[data-filter="edu"]').textContent    = t.filterEdu;
    document.querySelector('[data-filter="social"]').textContent = t.filterSocial;

    // contact
    const contactItems = [
      { i: '<circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/>',  v: CV.birth,    pre: t.born+' ' },
      { i: '<path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>', v: CV.location },
      { i: '<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>',  v: CV.email },
      { i: '<path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>', v: CV.linkedin },
      { i: '<path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>', v: CV.github },
      { i: '<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>', v: CV.website },
    ].filter(x => x.v);
    document.getElementById('contact-list').innerHTML = contactItems.map(x =>
      `<li>${icon(x.i)}<span>${(x.pre||'')}${x.v}</span></li>`
    ).join('');

    // skills
    document.getElementById('skill-list').innerHTML = CV.skills.map(s =>
      `<div class="skill-row"><span class="skill-name">${s[lang]}</span><div class="dots">${dots(s.pct)}</div></div>`
    ).join('');

    // languages
    document.getElementById('lang-list').innerHTML = CV.languages[lang].map(l =>
      `<div class="lang-row"><span class="lang-name">${l.lang}</span><span class="lang-level">${l.level}</span></div>`
    ).join('');

    // certs
    document.getElementById('cert-list').innerHTML = CV.certs.map(c => `<li>${c}</li>`).join('');

    // profile
    document.getElementById('cv-profile').textContent = t.profile(d);

    // git graph events
    const byBranch = { work: [], edu: [], social: [] };
    CV.gitEvents.forEach(e => byBranch[e.branch].push(e));

    ['work', 'edu', 'social'].forEach(branch => {
      document.getElementById(`events-${branch}`).innerHTML = byBranch[branch].map(e => {
        const dateStr = e.dateStart + (e.dateEnd ? ' → ' + e.dateEnd : ' → ' + t.ongoing);
        const tagsHtml = e.tags?.length
          ? `<div class="event-tags">${e.tags.map(tag => `<span class="event-tag">${tag}</span>`).join('')}</div>` : '';
        const descHtml = e.desc[lang] ? `<div class="event-desc">${e.desc[lang]}</div>` : '';
        return `<div class="git-event">
          <div class="event-date">${dateStr}</div>
          <div class="event-role">${e.role[lang]}</div>
          <div class="event-org">${e.org[lang]}</div>
          ${descHtml}${tagsHtml}
        </div>`;
      }).join('');
    });

    // awards
    document.getElementById('awards-list').innerHTML = CV.awards[lang].map(a => `<li>${a}</li>`).join('');
  }

  function filterGit(filter) {
    const tl = document.getElementById('git-timeline');
    tl.className = 'git-timeline' + (filter !== 'all' ? ` focus-${filter}` : '');
    document.querySelectorAll('.git-btn').forEach(btn =>
      btn.classList.toggle('active', btn.dataset.filter === filter)
    );
  }

  function toggleLang() { lang = lang === 'de' ? 'en' : 'de'; render(); }

  render();
</script>
</body>
</html>
