<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Pascal Masny</title>
  <meta name="description" content="Blog & Fotos von Pascal Masny: Projekte, Gedanken und Bilder.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/blog.css">
  <!-- PDF.js: in-page PDF rendering for the ~/pdfs viewer -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
</head>
<body>

<!-- ── Top bar ───────────────────────────────────────────────────────────── -->
<div id="topbar">
  <a class="tb-back" href="../index.html">&larr; <span data-key="back">Portfolio</span></a>
  <div class="tb-brand"><span class="dim">pascal@blog:</span>~<span class="cur">$</span></div>
  <div class="tb-spacer"></div>
  <button class="tb-btn" id="theme-btn">[th]</button>
  <button class="tb-btn" id="lang-btn">EN</button>
</div>

<div class="wrap">
  <div class="page-head">
    <h1><span class="accent">~/</span><span data-key="head.title">blog</span></h1>
    <p data-key="head.sub">Projekte, Gedanken & Fotos.</p>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="posts" data-key="tab.posts">~/posts</button>
    <button class="tab" data-tab="photos" data-key="tab.photos">~/photos</button>
    <button class="tab" data-tab="pdfs" data-key="tab.pdfs">~/pdfs</button>
  </div>

  <section class="panel active" id="panel-posts">
    <div class="cards" id="cards"></div>
    <div class="state" id="posts-state"></div>
  </section>

  <section class="panel" id="panel-photos">
    <div class="photos" id="photos"></div>
    <div class="state" id="photos-state"></div>
  </section>

  <section class="panel" id="panel-pdfs">
    <div class="cards" id="pdfs"></div>
    <div class="state" id="pdfs-state"></div>
  </section>
</div>

<!-- ── Lightbox ──────────────────────────────────────────────────────────── -->
<div id="lightbox">
  <button class="lb-close" aria-label="close">&#x2715;</button>
  <div>
    <img id="lb-img" src="" alt="">
    <div class="lb-cap" id="lb-cap"></div>
  </div>
</div>

<!-- ── PDF viewer ────────────────────────────────────────────────────────── -->
<div id="pdfviewer">
  <div class="pv-panel">
    <div class="pv-bar">
      <div class="pv-title" id="pv-title"></div>
      <span class="pv-count" id="pv-count"></span>
      <div class="pv-spacer"></div>
      <a class="tb-btn" id="pv-open" href="#" target="_blank" rel="noopener" data-key="pdf.open">open ↗</a>
      <a class="tb-btn" id="pv-dl" href="#" download data-key="pdf.download">download</a>
      <button class="tb-btn pv-close" aria-label="close">&#x2715;</button>
    </div>
    <div class="pv-body">
      <div class="pv-scroll" id="pv-scroll"></div>
      <button class="pv-nav pv-prev" id="pv-prev" aria-label="previous page">&#x2039;</button>
      <button class="pv-nav pv-next" id="pv-next" aria-label="next page">&#x203a;</button>
    </div>
  </div>
</div>

<script>
// ── Language + theme (shared localStorage keys with the homepage) ───────────
const STR = {
  de: { back: 'Portfolio', 'head.title': 'blog', 'head.sub': 'Projekte, Gedanken & Fotos.',
        'tab.posts': '~/posts', 'tab.photos': '~/photos', 'tab.pdfs': '~/pdfs',
        emptyPosts: '# noch keine Beiträge', emptyPhotos: '# noch keine Fotos',
        emptyPdfs: '# noch keine PDFs',
        'pdf.open': 'öffnen ↗', 'pdf.download': 'download',
        'pdf.hint': 'Vorschau lädt nicht? Im Tab öffnen.',
        pdfLoading: 'lädt …',
        pageWord: 'Seiten',
        loadErr: '# konnte Inhalte nicht laden' },
  en: { back: 'Portfolio', 'head.title': 'blog', 'head.sub': 'Projects, thoughts & photos.',
        'tab.posts': '~/posts', 'tab.photos': '~/photos', 'tab.pdfs': '~/pdfs',
        emptyPosts: '# no posts yet', emptyPhotos: '# no photos yet',
        emptyPdfs: '# no pdfs yet',
        'pdf.open': 'open ↗', 'pdf.download': 'download',
        'pdf.hint': "Preview not loading? Open in a new tab.",
        pdfLoading: 'loading …',
        pageWord: 'pages',
        loadErr: '# failed to load content' }
};

let lang  = localStorage.getItem('lang')
            || ((navigator.language || 'de').toLowerCase().startsWith('de') ? 'de' : 'en');
let theme = localStorage.getItem('theme') || 'dark';

let POSTS = [];
let PHOTOS = [];
let PDFS = [];

function applyTheme(t) {
  theme = t; localStorage.setItem('theme', t);
  document.documentElement.setAttribute('data-theme', t);
}
function applyLang(l) {
  lang = l; localStorage.setItem('lang', l);
  document.documentElement.lang = l;
  document.querySelectorAll('[data-key]').forEach(el => {
    const v = STR[l][el.dataset.key]; if (v != null) el.textContent = v;
  });
  document.getElementById('lang-btn').textContent = l === 'de' ? 'EN' : 'DE';
  renderPosts(); renderPhotos(); renderPdfs();
}

function fmtDate(iso) {
  const d = new Date(iso);
  return isNaN(d) ? iso : d.toLocaleDateString(lang === 'de' ? 'de-DE' : 'en-GB',
    { year: 'numeric', month: 'short', day: 'numeric' });
}
// cover/src in the JSON are paths from the site root → resolve from /pages/
const asset = p => '../' + p.replace(/^\/+/, '');

// ── Render ──────────────────────────────────────────────────────────────────
function renderPosts() {
  const wrap = document.getElementById('cards');
  const state = document.getElementById('posts-state');
  if (!POSTS.length) { wrap.innerHTML = ''; state.textContent = STR[lang].emptyPosts; return; }
  state.textContent = '';
  wrap.innerHTML = POSTS.map(p => `
    <a class="card" href="post.html?slug=${encodeURIComponent(p.slug)}">
      ${p.cover ? `<div class="card-cover"><img src="${asset(p.cover)}" alt="" loading="lazy"></div>` : ''}
      <div class="card-body">
        <div class="card-date">${fmtDate(p.date)}</div>
        <div class="card-title">${p.title[lang] || p.title.de || ''}</div>
        <div class="card-excerpt">${p.excerpt?.[lang] || p.excerpt?.de || ''}</div>
        ${(p.tags || []).length ? `<div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
      </div>
    </a>`).join('');
}

function renderPhotos() {
  const wrap = document.getElementById('photos');
  const state = document.getElementById('photos-state');
  if (!PHOTOS.length) { wrap.innerHTML = ''; state.textContent = STR[lang].emptyPhotos; return; }
  state.textContent = '';
  wrap.innerHTML = PHOTOS.map((ph, i) => `
    <div class="photo" data-i="${i}">
      <img src="${asset(ph.src)}" alt="${(ph.caption?.[lang] || '').replace(/"/g, '&quot;')}" loading="lazy">
      ${ph.caption?.[lang] ? `<div class="photo-cap">${ph.caption[lang]}</div>` : ''}
    </div>`).join('');
}

function renderPdfs() {
  const wrap = document.getElementById('pdfs');
  const state = document.getElementById('pdfs-state');
  if (!PDFS.length) { wrap.innerHTML = ''; state.textContent = STR[lang].emptyPdfs; return; }
  state.textContent = '';
  wrap.innerHTML = PDFS.map((p, i) => `
    <a class="card" href="${asset(p.file)}" data-pdf="${i}">
      ${p.cover ? `<div class="card-cover card-cover-pdf"><img src="${asset(p.cover)}" alt="" loading="lazy"></div>` : ''}
      <div class="card-body">
        <div class="card-date">${fmtDate(p.date)}${p.pages ? ` &middot; ${p.pages} ${STR[lang].pageWord}` : ''}</div>
        <div class="card-title">${p.title?.[lang] || p.title?.de || ''}</div>
        <div class="card-excerpt">${p.desc?.[lang] || p.desc?.de || ''}</div>
        ${(p.tags || []).length ? `<div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
      </div>
    </a>`).join('');
}

// ── PDF viewer (PDF.js) ─────────────────────────────────────────────────────
const pv       = document.getElementById('pdfviewer');
const pvScroll = document.getElementById('pv-scroll');
const pvCount  = document.getElementById('pv-count');
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
}
let pvDoc = null, pvNum = 0, pvCur = 1, pvObserver = null, pvToken = 0;

function setCount(n) { pvCur = n; pvCount.textContent = pvNum ? `${n} / ${pvNum}` : ''; }

async function renderPage(slot) {
  if (slot.dataset.rendered || !pvDoc) return;
  slot.dataset.rendered = '1';
  const page  = await pvDoc.getPage(+slot.dataset.page);
  const base  = page.getViewport({ scale: 1 });
  const scale = Math.min(2, ((pvScroll.clientWidth - 32) || 800) / base.width);
  const vp    = page.getViewport({ scale: scale * Math.min(2, window.devicePixelRatio || 1) });
  const canvas = document.createElement('canvas');
  canvas.width = vp.width; canvas.height = vp.height;
  slot.innerHTML = ''; slot.appendChild(canvas);
  await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
}

async function openPdf(i) {
  const p = PDFS[i]; if (!p) return;
  const url = asset(p.file);
  document.getElementById('pv-title').textContent = p.title?.[lang] || p.title?.de || '';
  document.getElementById('pv-open').href = url;
  document.getElementById('pv-dl').href = url;
  pv.classList.add('open');
  document.body.style.overflow = 'hidden';

  const token = ++pvToken;                 // guards against fast open/close races
  pvScroll.innerHTML = `<div class="pv-loading">${STR[lang].pdfLoading}</div>`;
  setCount(0);

  if (!window.pdfjsLib) {                   // CDN blocked → graceful fallback
    pvScroll.innerHTML = `<div class="pv-loading">${STR[lang]['pdf.hint']}</div>`;
    return;
  }
  try {
    const doc = await pdfjsLib.getDocument(url).promise;
    if (token !== pvToken) { doc.destroy(); return; }
    pvDoc = doc; pvNum = doc.numPages;
    const first = await doc.getPage(1);
    const r = first.getViewport({ scale: 1 });
    pvScroll.innerHTML = '';
    for (let n = 1; n <= pvNum; n++) {
      const slot = document.createElement('div');
      slot.className = 'pv-page';
      slot.dataset.page = n;
      slot.style.aspectRatio = (r.width / r.height).toFixed(4);
      pvScroll.appendChild(slot);
    }
    if (pvObserver) pvObserver.disconnect();
    pvObserver = new IntersectionObserver(ents => {
      ents.forEach(en => { if (en.isIntersecting) renderPage(en.target); });
    }, { root: pvScroll, rootMargin: '300px 0px' });
    [...pvScroll.children].forEach(s => pvObserver.observe(s));
    pvScroll.scrollTop = 0;
    setCount(1);
  } catch (_) {
    if (token === pvToken)
      pvScroll.innerHTML = `<div class="pv-loading">${STR[lang]['pdf.hint']}</div>`;
  }
}

function closePdf() {
  pv.classList.remove('open');
  document.body.style.overflow = '';
  pvToken++;
  if (pvObserver) { pvObserver.disconnect(); pvObserver = null; }
  if (pvDoc) { pvDoc.destroy(); pvDoc = null; }
  pvNum = 0; pvScroll.innerHTML = ''; setCount(0);
}

function gotoPage(n) {
  n = Math.max(1, Math.min(pvNum, n));
  const slot = pvScroll.querySelector(`.pv-page[data-page="${n}"]`);
  if (slot) slot.scrollIntoView({ behavior: 'smooth', block: 'start' });
  setCount(n);
}

// Update the page counter from whatever is centered in the scroll viewport.
pvScroll.addEventListener('scroll', () => {
  if (!pvNum) return;
  const mid = pvScroll.scrollTop + pvScroll.clientHeight / 2;
  let cur = 1;
  for (const s of pvScroll.children) {
    if (s.offsetTop <= mid) cur = +s.dataset.page; else break;
  }
  if (cur !== pvCur) setCount(cur);
});

document.getElementById('pdfs').addEventListener('click', e => {
  const card = e.target.closest('.card[data-pdf]');
  if (card) { e.preventDefault(); openPdf(+card.dataset.pdf); }
});
pv.addEventListener('click', e => { if (e.target === pv) closePdf(); });
pv.querySelector('.pv-close').addEventListener('click', closePdf);
document.getElementById('pv-prev').addEventListener('click', () => gotoPage(pvCur - 1));
document.getElementById('pv-next').addEventListener('click', () => gotoPage(pvCur + 1));

// ── Lightbox ──────────────────────────────────────────────────────────────
const lb = document.getElementById('lightbox');
function openLightbox(i) {
  const ph = PHOTOS[i]; if (!ph) return;
  document.getElementById('lb-img').src = asset(ph.src);
  document.getElementById('lb-cap').textContent = ph.caption?.[lang] || '';
  lb.classList.add('open');
}
lb.addEventListener('click', () => lb.classList.remove('open'));
document.getElementById('photos').addEventListener('click', e => {
  const el = e.target.closest('.photo'); if (el) openLightbox(+el.dataset.i);
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { lb.classList.remove('open'); closePdf(); }
  if (pv.classList.contains('open')) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); gotoPage(pvCur + 1); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); gotoPage(pvCur - 1); }
  }
});

// ── Tabs ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab));
  document.querySelectorAll('.panel').forEach(p =>
    p.classList.toggle('active', p.id === 'panel-' + tab.dataset.tab));
}));

// ── Controls ─────────────────────────────────────────────────────────────────
document.getElementById('theme-btn').addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));
document.getElementById('lang-btn').addEventListener('click', () => applyLang(lang === 'de' ? 'en' : 'de'));

// ── Load data ─────────────────────────────────────────────────────────────────
applyTheme(theme);
applyLang(lang);

Promise.all([
  fetch('../blog/posts.json').then(r => r.ok ? r.json() : []).catch(() => null),
  fetch('../blog/photos.json').then(r => r.ok ? r.json() : []).catch(() => null),
  fetch('../blog/pdfs.json').then(r => r.ok ? r.json() : []).catch(() => null)
]).then(([posts, photos, pdfs]) => {
  if (posts === null || photos === null) {
    document.getElementById('posts-state').textContent = STR[lang].loadErr;
    return;
  }
  POSTS  = (posts  || []).sort((a, b) => new Date(b.date) - new Date(a.date));
  PHOTOS = (photos || []).sort((a, b) => new Date(b.date) - new Date(a.date));
  PDFS   = (pdfs   || []).sort((a, b) => new Date(b.date) - new Date(a.date));
  renderPosts(); renderPhotos(); renderPdfs();
});
</script>
</body>
</html>
